<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario Envio Correo</title>
</head>
<body>
    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Enviar Correo</title>
</head>
<body>

<h2>Enviar Correo</h2>

<form action="/enviar" method="post" enctype="multipart/form-data">

    <label>Destinatario:</label>
    <input type="email"
           name="destinatario"
           required>

    <br><br>

    <label>Asunto:</label>
    <input type="text"
           name="asunto"
           required>

    <br><br>

    <label>Mensaje:</label>

    <br>

    <textarea name="mensaje"
              rows="10"
              cols="50"
              required>
    </textarea>
    <br>  
    <label>Adjuntos:</label>
    <input type="file" name="attachments" multiple> 
    <br><br>

    <button type="submit">
        Enviar Correo
    </button>

</form>

</body>
</html>
